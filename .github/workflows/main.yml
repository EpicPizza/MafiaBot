name: Build and Deploy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@master
      - name: Install Dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Archive Production Build Artifact
        uses: actions/upload-artifact@master
        with:
          name: build
          path: |
            build
  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    env:
      CLOUDSDK_PYTHON_SITEPACKAGES: 1 
    steps:
      - name: Checkout Repo
        uses: actions/checkout@master
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
      - name: Production Server
        uses: google-github-actions/ssh-compute@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          zone: ${{ secrets.GCP_VM_ZONE }}
          instance_name: ${{ secrets.GCP_VM_NAME }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          user: ${{ secrets.USERNAME }}
          command: |
              pm2 list
              pm2 stop mafia-bot
              cd ../${{ secrets.USERNAME }}/MafiaBot
              sudo rm -rf build build.zip
              git restore .
              git pull origin main
              sudo npm i
              DOWNLOAD_URL=$(curl -sf \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                | node -e '
                    const fs = require("fs");
                    const data = JSON.parse(fs.readFileSync(0, "utf-8"));
                    const art = data.artifacts.find(a => a.name === "build");
                    if (art) {
                        console.log(art.archive_download_url);
                    } else {
                        process.stderr.write("No artifact named \"build\" found in response\n");
                        process.exit(1);
                    }
                ')
              curl -fL \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -o build.zip \
                "$DOWNLOAD_URL"
              unzip -o build.zip -d build
              rm build.zip
              pm2 restart mafia-bot
